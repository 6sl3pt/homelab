apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authelia
  namespace: authelia
spec:
  interval: 30m
  chart:
    spec:
      chart: authelia
      version: '0.11.6'
      sourceRef:
        kind: HelmRepository
        name: authelia
        namespace: authelia
      interval: 12h

  valuesFrom:
    - kind: ConfigMap
      name: authelia-values

  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: authelia
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: authelia
                annotations:
                  secret.reloader.stakater.com/reload: "authelia-secrets"
