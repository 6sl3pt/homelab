apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: litellm
  namespace: litellm
spec:
  parentRefs:
    - name: apps-gateway
      namespace: cilium-gateway
      sectionName: litellm-ui
  hostnames:
    - litellm.apps.6541333.xyz
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1
      backendRefs:
        - name: litellm-litellm-gateway
          port: 4000

    - matches:
        - path:
            type: PathPrefix
            value: /ui
        - path:
            type: PathPrefix
            value: /litellm-asset-prefix
        - path:
            type: PathPrefix
            value: /static
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Forwarded-Proto
                value: https
      backendRefs:
        - name: litellm-litellm-ui
          port: 3000

    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: litellm-litellm-backend
          port: 4001
