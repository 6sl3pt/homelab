apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rclone-container-env
  namespace: its-mytabs
spec:
  refreshInterval: "0"
  secretStoreRef:
    name: azure-kv-store
    kind: ClusterSecretStore
  data:
    - secretKey: RCLONE_CONFIG_R2_ACCESS_KEY_ID
      remoteRef:
        key: rclone-r2-access-key-id
    - secretKey: RCLONE_CONFIG_R2_SECRET_ACCESS_KEY
      remoteRef:
        key: rclone-r2-secret-access-key
    - secretKey: RCLONE_CONFIG_CRYPT_PASSWORD
      remoteRef:
        key: its-mytabs-rclone-encrypt-password

