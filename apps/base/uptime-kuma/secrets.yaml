apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: uptime-kuma-container-env
  namespace: uptime-kuma
spec:
  refreshInterval: "0"
  secretStoreRef:
    name: azure-kv-store
    kind: ClusterSecretStore
  data:
    - secretKey: UPTIME_KUMA_CLOUDFLARED_TOKEN
      remoteRef:
        key: cloudflare-tunnel-uptime-kuma
