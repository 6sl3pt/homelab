apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: dns-gateway
  namespace: cilium-gateway
  annotations:
    cilium.io/lb-ipam-pool: gateway-pool
spec:
  gatewayClassName: cilium
  addresses:
    - type: IPAddress
      value: 10.134.20.103
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All

    - name: dns-https
      protocol: TLS
      port: 443
      hostname: dns.6541333.xyz
      tls:
        mode: Passthrough
      allowedRoutes: &allow_adguard
        namespaces:
          from: Selector
          selector:
            matchLabels:
              kubernetes.io/metadata.name: adguard

    - name: dns-tls
      protocol: TLS
      port: 853
      hostname: dns.6541333.xyz
      allowedRoutes: *allow_adguard
      tls:
        mode: Passthrough
