apiVersion: 'cilium.io/v2alpha1'
kind: CiliumL2AnnouncementPolicy
metadata:
  name: static-ip-policy
  namespace: kube-system
spec:
  serviceSelector:
    matchLabels:
      cilium-lb-pool: static-ip-pool

  # IMPORTANT: if externalIPss is desired, externalIPs.enabled=true must be set in values.yaml
  # externalIPs: true
  loadBalancerIPs: true
---
apiVersion: 'cilium.io/v2alpha1'
kind: CiliumL2AnnouncementPolicy
metadata:
  name: gateway-policy
  namespace: kube-system
spec:
  serviceSelector:
    matchExpressions:
      - key: io.cilium.gateway/owning-gateway
        operator: Exists

  loadBalancerIPs: true
---
apiVersion: 'cilium.io/v2alpha1'
kind: CiliumL2AnnouncementPolicy
metadata:
  name: ingress-policy
  namespace: kube-system
spec:
  serviceSelector:
    matchLabels:
      cilium.io/ingress: 'true'

  loadBalancerIPs: true
---
apiVersion: 'cilium.io/v2alpha1'
kind: CiliumL2AnnouncementPolicy
metadata:
  name: apps-policy
  namespace: kube-system
spec:
  serviceSelector:
    matchLabels:
      cilium-lb-pool: apps-pool

  loadBalancerIPs: true
---
apiVersion: 'cilium.io/v2alpha1'
kind: CiliumL2AnnouncementPolicy
metadata:
  name: postgres-policy
  namespace: kube-system
spec:
  serviceSelector:
    matchLabels:
      cilium-lb-pool: postgres-pool

  loadBalancerIPs: true
