apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: msmtpd-container-env
  namespace: msmtpd
spec:
  refreshInterval: '0'
  secretStoreRef:
    name: azure-kv-store
    kind: ClusterSecretStore
  data:
    - secretKey: SMTP_PASSWORD
      remoteRef:
        key: smtprelay-app-password
